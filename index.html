<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="歯医者予約">
  <meta name="theme-color" content="#0a1628">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>歯医者予約スキャナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060d1a;
      --surface: #0d1f3a;
      --surface2: #122540;
      --accent: #00d4ff;
      --accent2: #0077ff;
      --accent3: #7b2fff;
      --text: #e8f4ff;
      --text-dim: #6b8aaa;
      --border: rgba(0, 212, 255, 0.15);
      --success: #00ffb3;
      --error: #ff4d6d;
      --glow: 0 0 30px rgba(0, 212, 255, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: -webkit-fill-available;
      overflow-x: hidden;
      position: relative;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* Ambient glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 { width: 300px; height: 300px; background: rgba(0,119,255,0.12); top: -100px; right: -100px; }
    .orb2 { width: 250px; height: 250px; background: rgba(123,47,255,0.1); bottom: 100px; left: -80px; }

    .app {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 0 40px;
      min-height: 100vh;
    }

    /* Header */
    .header {
      padding: 60px 24px 28px;
      text-align: center;
    }

    .header-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      box-shadow: 0 8px 32px rgba(0, 119, 255, 0.4);
    }

    .header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 6px;
    }

    .header p {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Main card */
    .card {
      margin: 0 16px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    /* Camera area */
    .camera-area {
      position: relative;
      background: #050c1a;
      min-height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: none;
    }

    #canvas { display: none; }

    .camera-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 40px;
    }

    .camera-icon {
      width: 72px;
      height: 72px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      background: rgba(0,212,255,0.05);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.2); }
      50% { box-shadow: 0 0 0 16px rgba(0,212,255,0); }
    }

    .camera-placeholder p {
      font-size: 13px;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.6;
    }

    /* Scan overlay */
    .scan-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .scan-overlay.active { display: flex; }

    .scan-frame {
      width: 240px;
      height: 160px;
      position: relative;
    }

    .scan-frame::before, .scan-frame::after,
    .scan-frame span::before, .scan-frame span::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--accent);
      border-style: solid;
    }
    .scan-frame::before { top: 0; left: 0; border-width: 2px 0 0 2px; }
    .scan-frame::after { top: 0; right: 0; border-width: 2px 2px 0 0; }
    .scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 2px 2px; }
    .scan-frame span::after { bottom: 0; right: 0; border-width: 0 2px 2px 0; }

    .scan-line {
      position: absolute;
      top: 0; left: 4px; right: 4px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 8px var(--accent);
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }

    /* Captured image */
    #captured-img {
      width: 100%;
      height: 260px;
      object-fit: cover;
      display: none;
    }

    /* Buttons row */
    .btn-row {
      display: flex;
      gap: 10px;
      padding: 16px;
    }

    .btn {
      flex: 1;
      padding: 14px 16px;
      border: none;
      border-radius: 12px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
    }

    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent2), var(--accent3));
      color: white;
      box-shadow: 0 4px 20px rgba(0, 119, 255, 0.35);
    }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-success {
      background: linear-gradient(135deg, #00b37a, #00ffb3);
      color: #001a0e;
      box-shadow: 0 4px 20px rgba(0, 255, 179, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* File input */
    #file-input { display: none; }

    /* API Key section */
    .api-section {
      margin: 0 16px 16px;
    }

    .label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-dim);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .label .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
    }

    .input-wrap input::placeholder { color: var(--text-dim); font-size: 12px; }

    .input-note {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 6px;
      padding: 0 4px;
      line-height: 1.5;
    }

    /* Result section */
    .result-section {
      margin: 0 16px 16px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .result-card.show { display: block; }

    .result-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--success), transparent);
    }

    .result-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--success);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    .result-item {
      background: rgba(0,255,179,0.04);
      border: 1px solid rgba(0,255,179,0.1);
      border-radius: 10px;
      padding: 12px 14px;
    }

    .result-item-label {
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .result-item-value {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    /* Editable fields */
    .edit-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(0,212,255,0.2);
      color: var(--text);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 4px 0;
      outline: none;
      transition: border-color 0.2s;
    }

    .edit-input:focus {
      border-bottom-color: var(--accent);
    }

    /* Status message */
    #status {
      margin: 0 16px 12px;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    #status.show { display: flex; }
    #status.loading { background: rgba(0,119,255,0.1); border: 1px solid rgba(0,119,255,0.3); color: var(--accent); }
    #status.success { background: rgba(0,255,179,0.08); border: 1px solid rgba(0,255,179,0.2); color: var(--success); }
    #status.error { background: rgba(255,77,109,0.1); border: 1px solid rgba(255,77,109,0.3); color: var(--error); }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(0,212,255,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* How to install */
    .install-hint {
      margin: 0 16px 8px;
      background: rgba(123,47,255,0.08);
      border: 1px solid rgba(123,47,255,0.2);
      border-radius: 14px;
      padding: 14px 16px;
    }

    .install-hint-title {
      font-size: 11px;
      font-weight: 700;
      color: #b98aff;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .install-hint ol {
      font-size: 12px;
      color: var(--text-dim);
      padding-left: 18px;
      line-height: 1.8;
    }

    .install-hint li span {
      color: var(--text);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 12px 24px;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="app">
    <div class="header">
      <div class="header-icon">🦷</div>
      <h1>歯医者予約スキャナー</h1>
      <p>診察券を撮影して、カレンダーに自動登録</p>
    </div>

    <!-- Camera Card -->
    <div class="card">
      <div class="camera-area" id="camera-area">
        <video id="preview" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>
        <img id="captured-img" alt="撮影した画像">

        <div class="camera-placeholder" id="placeholder">
          <div class="camera-icon">📷</div>
          <p>カメラで診察券を撮影するか<br>画像を選択してください</p>
        </div>

        <div class="scan-overlay" id="scan-overlay">
          <div class="scan-frame">
            <span></span>
            <div class="scan-line"></div>
          </div>
        </div>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-camera" onclick="startCamera()">
          📷 カメラ起動
        </button>
        <button class="btn btn-secondary" id="btn-file" onclick="document.getElementById('file-input').click()">
          🖼 画像選択
        </button>
      </div>

      <!-- Capture/Retake buttons (hidden initially) -->
      <div class="btn-row" id="capture-row" style="display:none; padding-top:0">
        <button class="btn btn-primary" id="btn-capture" onclick="capturePhoto()">
          ⚡ 撮影する
        </button>
        <button class="btn btn-secondary" onclick="resetCamera()">
          ✕ キャンセル
        </button>
      </div>

      <input type="file" id="file-input" accept="image/*" onchange="handleFileSelect(event)">
    </div>

    <!-- API Key -->
    <div class="api-section">
      <div class="label"><span class="dot"></span>Claude API キー</div>
      <div class="input-wrap">
        <input type="password" id="api-key" placeholder="sk-ant-api03-..." 
          oninput="saveApiKey(this.value)" />
      </div>
      <p class="input-note">
        ※ APIキーはお使いの端末のみに保存されます（サーバーには送信されません）<br>
        取得先: <a href="https://console.anthropic.com" target="_blank" style="color:var(--accent)">console.anthropic.com</a>
      </p>
    </div>

    <!-- Analyze button -->
    <div style="margin: 0 16px 16px">
      <button class="btn btn-primary" id="btn-analyze" onclick="analyzeImage()" disabled style="width:100%; padding:16px">
        🔍 AIで日時を読み取る
      </button>
    </div>

    <!-- Status -->
    <div id="status"></div>

    <!-- Result -->
    <div class="result-section">
      <div class="result-card" id="result-card">
        <div class="result-title">✓ 読み取り完了</div>
        <div class="result-grid">
          <div class="result-item">
            <div class="result-item-label">医院名</div>
            <input class="edit-input" id="res-clinic" type="text" placeholder="○○歯科クリニック">
          </div>
          <div class="result-item">
            <div class="result-item-label">予約日時</div>
            <input class="edit-input" id="res-datetime" type="text" placeholder="2025年1月15日 10:30">
          </div>
          <div class="result-item">
            <div class="result-item-label">備考</div>
            <input class="edit-input" id="res-note" type="text" placeholder="定期健診">
          </div>
        </div>

        <div style="display:flex; gap:10px">
          <button class="btn btn-success" onclick="addToCalendar('google')" style="flex:1; padding:15px; font-size:14px">
            📅 Google
          </button>
          <button class="btn" onclick="addToCalendar('yahoo')" style="flex:1; padding:15px; font-size:14px; background:linear-gradient(135deg,#6f00cc,#a040ff); color:white; box-shadow:0 4px 20px rgba(111,0,204,0.3)">
            📅 Yahoo!
          </button>
        </div>
      </div>
    </div>

    <!-- Install hint -->
    <div class="install-hint">
      <div class="install-hint-title">📱 ホーム画面に追加する方法</div>
      <ol>
        <li>Safariでこのページを開く</li>
        <li>下の<span>「共有」ボタン（□↑）</span>をタップ</li>
        <li><span>「ホーム画面に追加」</span>を選択</li>
        <li><span>「追加」</span>をタップして完了</li>
      </ol>
    </div>

    <div class="footer">
      画像はAI解析のみに使用され、保存・送信されません
    </div>
  </div>

  <script>
    let stream = null;
    let capturedImageData = null;
    let isCameraActive = false;

    // Load saved API key
    const savedKey = localStorage.getItem('claude_api_key');
    if (savedKey) document.getElementById('api-key').value = savedKey;

    function saveApiKey(val) {
      localStorage.setItem('claude_api_key', val);
    }

    function showStatus(msg, type) {
      const el = document.getElementById('status');
      el.className = `show ${type}`;
      if (type === 'loading') {
        el.innerHTML = `<div class="spinner"></div><span>${msg}</span>`;
      } else {
        el.innerHTML = `<span>${type === 'success' ? '✓' : '✕'}</span><span>${msg}</span>`;
      }
    }

    function hideStatus() {
      document.getElementById('status').className = '';
    }

    async function startCamera() {
      try {
        resetUI();
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }
        });
        const video = document.getElementById('preview');
        video.srcObject = stream;
        video.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('scan-overlay').classList.add('active');
        document.getElementById('btn-camera').style.display = 'none';
        document.getElementById('btn-file').style.display = 'none';
        document.getElementById('capture-row').style.display = 'flex';
        isCameraActive = true;
      } catch (e) {
        showStatus('カメラへのアクセスが許可されていません。設定から許可してください。', 'error');
      }
    }

    function capturePhoto() {
      const video = document.getElementById('preview');
      const canvas = document.getElementById('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      capturedImageData = canvas.toDataURL('image/jpeg', 0.9);
      
      // Show captured image
      const img = document.getElementById('captured-img');
      img.src = capturedImageData;
      img.style.display = 'block';
      video.style.display = 'none';
      document.getElementById('scan-overlay').classList.remove('active');
      
      stopStream();
      isCameraActive = false;
      document.getElementById('capture-row').style.display = 'none';
      document.getElementById('btn-camera').style.display = '';
      document.getElementById('btn-file').style.display = '';
      document.getElementById('btn-camera').textContent = '🔄 撮り直す';
      document.getElementById('btn-camera').onclick = () => { resetCamera(); startCamera(); };
      document.getElementById('btn-analyze').disabled = false;
    }

    function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        capturedImageData = e.target.result;
        const img = document.getElementById('captured-img');
        img.src = capturedImageData;
        img.style.display = 'block';
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('btn-analyze').disabled = false;
        hideStatus();
        document.getElementById('result-card').classList.remove('show');
      };
      reader.readAsDataURL(file);
      event.target.value = '';
    }

    function stopStream() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    function resetCamera() {
      stopStream();
      isCameraActive = false;
      const video = document.getElementById('preview');
      video.style.display = 'none';
      document.getElementById('captured-img').style.display = 'none';
      document.getElementById('placeholder').style.display = 'flex';
      document.getElementById('scan-overlay').classList.remove('active');
      document.getElementById('capture-row').style.display = 'none';
      document.getElementById('btn-camera').style.display = '';
      document.getElementById('btn-file').style.display = '';
      document.getElementById('btn-camera').textContent = '📷 カメラ起動';
      document.getElementById('btn-camera').onclick = startCamera;
    }

    function resetUI() {
      hideStatus();
      document.getElementById('result-card').classList.remove('show');
      capturedImageData = null;
    }

    async function analyzeImage() {
      const apiKey = document.getElementById('api-key').value.trim();
      if (!apiKey) {
        showStatus('Claude APIキーを入力してください', 'error');
        return;
      }
      if (!capturedImageData) {
        showStatus('まず画像を撮影または選択してください', 'error');
        return;
      }

      showStatus('AIが診察券を解析中...', 'loading');
      document.getElementById('btn-analyze').disabled = true;

      try {
        const base64 = capturedImageData.split(',')[1];
        const mediaType = capturedImageData.split(';')[0].split(':')[1];

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-opus-4-5',
            max_tokens: 500,
            messages: [{
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: { type: 'base64', media_type: mediaType, data: base64 }
                },
                {
                  type: 'text',
                  text: `この歯医者の診察券や予約票には、過去の受診歴と今後の予約が混在しています。
今日の日付は${new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric'})}です。

診察券に記載されたすべての日付のうち、【今日以降で最も近い未来の予約】を1件だけ選んで、次のJSON形式のみで返してください。余計なテキスト・マークダウン不要。

{
  "clinic": "医院名（不明な場合は空文字）",
  "date": "予約日（YYYY-MM-DD形式。西暦が書かれていない場合は今日の日付を基準に直近の未来になるよう${new Date().getFullYear()}年か${new Date().getFullYear()+1}年を判断して補完）",
  "time": "予約時刻（HH:MM形式、24時間）",
  "note": "診療内容や備考（わかる範囲で）"
}

重要：過去の日付は絶対に選ばないこと。複数の未来の予約がある場合は最も近いものだけを返すこと。`
                }
              ]
            }]
          })
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || `API エラー (${response.status})`);
        }

        const data = await response.json();
        const text = data.content.map(b => b.text || '').join('');
        
        let parsed;
        try {
          const jsonMatch = text.match(/\{[\s\S]*\}/);
          parsed = JSON.parse(jsonMatch ? jsonMatch[0] : text);
        } catch {
          throw new Error('AIの応答を解析できませんでした。もう一度お試しください。');
        }

        // Format display datetime
        let displayDatetime = '';
        if (parsed.date) {
          const d = new Date(parsed.date + 'T' + (parsed.time || '00:00'));
          const opts = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' };
          displayDatetime = d.toLocaleDateString('ja-JP', opts);
          if (parsed.time) displayDatetime += ' ' + parsed.time;
        }

        document.getElementById('res-clinic').value = parsed.clinic || '';
        document.getElementById('res-datetime').value = displayDatetime || (parsed.date || '');
        document.getElementById('res-note').value = parsed.note || '歯科定期健診';
        
        // Store raw data for calendar
        document.getElementById('res-datetime').dataset.date = parsed.date || '';
        document.getElementById('res-datetime').dataset.time = parsed.time || '';

        document.getElementById('result-card').classList.add('show');
        showStatus('読み取り完了！内容を確認してカレンダーに登録してください', 'success');

      } catch (e) {
        showStatus('エラー: ' + e.message, 'error');
      } finally {
        document.getElementById('btn-analyze').disabled = false;
      }
    }

    function addToCalendar(service) {
      const clinic = document.getElementById('res-clinic').value || '歯科予約';
      const datetimeEl = document.getElementById('res-datetime');
      const note = document.getElementById('res-note').value;
      
      let date = datetimeEl.dataset.date;
      let time = datetimeEl.dataset.time;

      if (!date) {
        showStatus('日付を確認できませんでした。直接入力欄を編集してください', 'error');
        return;
      }

      const titleRaw = clinic + (note ? '【' + note + '】' : '');
      const title = encodeURIComponent(titleRaw);
      const details = encodeURIComponent('歯科予約スキャナーで自動登録');

      let url;
      if (service === 'yahoo') {
        // Yahoo!カレンダー形式
        // ST=YYYYMMDDTHHmmss  ET=YYYYMMDDTHHmmss
        let st, et;
        if (time) {
          const start = new Date(`${date}T${time}:00`);
          const end = new Date(start.getTime() + 60 * 60000);
          const fmt = d => d.getFullYear().toString()
            + String(d.getMonth()+1).padStart(2,'0')
            + String(d.getDate()).padStart(2,'0')
            + 'T' + String(d.getHours()).padStart(2,'0')
            + String(d.getMinutes()).padStart(2,'0') + '00';
          st = fmt(start);
          et = fmt(end);
        } else {
          st = date.replace(/-/g,'') + 'T000000';
          et = date.replace(/-/g,'') + 'T235900';
        }
        url = `https://calendar.yahoo.co.jp/?v=60&view=d&type=20&title=${title}&st=${st}&et=${et}&desc=${details}`;
        showStatus('Yahoo!カレンダーが開きます。「保存」をタップして完了！', 'success');
      } else {
        // Googleカレンダー形式
        let startStr, endStr;
        if (time) {
          const start = new Date(`${date}T${time}:00`);
          const end = new Date(start.getTime() + 60 * 60000);
          startStr = start.toISOString().replace(/-|:|\.\d{3}/g, '').slice(0, 15) + 'Z';
          endStr   = end.toISOString().replace(/-|:|\.\d{3}/g, '').slice(0, 15) + 'Z';
        } else {
          startStr = date.replace(/-/g, '');
          endStr = startStr;
        }
        url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${startStr}/${endStr}&details=${details}`;
        showStatus('Googleカレンダーが開きます。「保存」をタップして完了！', 'success');
      }

      window.open(url, '_blank');
    }

    // Cleanup on page hide
    document.addEventListener('visibilitychange', () => {
      if (document.hidden && isCameraActive) stopStream();
    });
  </script>
</body>
